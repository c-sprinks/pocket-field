; PlatformIO Project Configuration File
;
; pocket-field firmware — runs on M5Stack Cardputter ADV (ESP32-S3FN8)
;
; Build: pio run
; Flash: pio run -t upload
; Test:  pio test

[platformio]
default_envs = cardputter-adv

; ----------------------------------------------------------------------------
; Cardputter ADV hardware target
; ----------------------------------------------------------------------------
[env:cardputter-adv]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D POCKET_FIELD_FW_VERSION=\"0.0.1-dev\"
    -D POCKET_FIELD_PROTOCOL_VERSION=\"1\"
    -D CORE_DEBUG_LEVEL=3

lib_deps =
    ; Feature module deps added in Phase 1+
    ; e.g. adafruit/Adafruit PN532 for NFC

; ----------------------------------------------------------------------------
; Native platform for unit tests — no hardware required
; ----------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=c++17
    -D POCKET_FIELD_NATIVE_TEST
