; PlatformIO Project Configuration File
;
; pocket-field firmware — runs on M5Stack Cardputter ADV (ESP32-S3FN8)
;
; Build: pio run
; Flash: pio run -t upload
; Test:  pio test

[platformio]
default_envs = cardputter-adv

; ----------------------------------------------------------------------------
; Cardputter ADV hardware target
; ----------------------------------------------------------------------------
[env:cardputter-adv]
platform = espressif32
board = m5stack-stamps3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D POCKET_FIELD_FW_VERSION=\"0.1.0\"
    -D POCKET_FIELD_PROTOCOL_VERSION=\"1\"
    -D CORE_DEBUG_LEVEL=3
    ; ESP32-S3 native USB CDC: route Arduino Serial through USB, not UART0 pins.
    ; Without these, Serial output goes to unexposed UART pins on the Cardputter.
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    m5stack/M5Cardputer @ ^1.0.3
    ; Feature module deps added in Phase 2+
    ; e.g. adafruit/Adafruit PN532 for NFC

; ----------------------------------------------------------------------------
; Native platform for unit tests — no hardware required
; ----------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
    -std=c++17
    -D POCKET_FIELD_NATIVE_TEST
    -D POCKET_FIELD_FW_VERSION=\"0.0.1-dev-native\"
    -D POCKET_FIELD_PROTOCOL_VERSION=\"1\"
    -I include
build_src_filter =
    +<serial_cli.cpp>
    +<commands/system_cmds.cpp>
