name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  firmware:
    name: Firmware (PlatformIO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio
      - name: Build firmware (cardputter-adv)
        working-directory: firmware
        run: pio run -e cardputter-adv
      - name: Run firmware unit tests (native)
        working-directory: firmware
        run: pio test -e native

  mcp:
    name: MCP server (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install package
        working-directory: mcp
        run: uv pip install --system -e ".[dev]"
      - name: Lint (ruff)
        working-directory: mcp
        run: ruff check .
      - name: Typecheck (mypy)
        working-directory: mcp
        run: mypy src/
      - name: Tests (pytest)
        working-directory: mcp
        run: pytest
